name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
          - os: ubuntu-latest
            platform: linux-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: bun install

      - name: Build CSS
        run: bun run build:css

      - name: Build app
        run: node node_modules/.bin/electrobun build --env=stable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beatdown-${{ matrix.platform }}
          path: build/stable-${{ matrix.platform }}/
          if-no-files-found: error
